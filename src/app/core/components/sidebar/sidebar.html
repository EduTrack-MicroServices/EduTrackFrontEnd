<div class="sidebar bg-dark text-white shadow" [class.collapsed]="isCollapsed()">
  <div class="sidebar-header p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
    <span class="fs-4 fw-bold text-primary" *ngIf="!isCollapsed()">EduTrack</span>
    <button class="btn btn-dark btn-sm border-0" (click)="toggleSidebar()">
      <i class="bi" [ngClass]="isCollapsed() ? 'bi-list' : 'bi-chevron-left'"></i>
    </button>
  </div>

  <div class="list-group list-group-flush mt-3">
    <a routerLink="/dashboard" routerLinkActive="active" class="list-group-item list-group-item-action bg-dark text-white p-3 border-0">
      <i class="bi bi-speedometer2 me-2"></i>
      <span *ngIf="!isCollapsed()">Dashboard</span>
    </a>
    
    <a routerLink="/program-list" routerLinkActive="active" class="list-group-item list-group-item-action bg-dark text-white p-3 border-0">
      <i class="bi bi-search me-2"></i>
      <span *ngIf="!isCollapsed()">Find a Course</span>
    </a>

    <ng-container *ngIf="userRole() === 'ADMIN' || userRole() === 'INSTRUCTOR'">
       <a routerLink="/admin-dashboard" routerLinkActive="active" class="list-group-item list-group-item-action bg-dark text-white p-3 border-0">
        <i class="bi bi-shield-lock me-2"></i>
        <span *ngIf="!isCollapsed()">Admin Console</span>
      </a>
    </ng-container>

    <div class="logout-section mt-auto border-top border-secondary">
      <a class="list-group-item list-group-item-action bg-dark text-white p-3 border-0" (click)="onLogout()" style="cursor: pointer;">
        <i class="bi bi-box-arrow-right me-2 text-danger"></i>
        <span *ngIf="!isCollapsed()">Logout</span>
      </a>
    </div>
  </div>
</div>
