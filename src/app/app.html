<ngx-sonner-toaster position="top-right" [richColors]="true" theme="light"></ngx-sonner-toaster>

<div class="app-container">
  @if (authService.userRole()) {
    <app-sidebar #sidebar="SidebarComponent"></app-sidebar>
    
    <main class="content-area" 
          [class.content-shifted]="!sidebar.isCollapsed()" 
          [class.content-collapsed]="sidebar.isCollapsed()">
      <router-outlet></router-outlet>
    </main>
  } @else {
    <main class="full-width">
      <router-outlet></router-outlet>
    </main>
  }
</div>
